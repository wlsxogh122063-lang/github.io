<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILKER 1888 - 맞춤 상담 신청</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    
    <style>
        :root { --gold: #D4AF37; --bg-base: #000000; --bg-panel: #111111; --text-main: #ffffff; --text-sub: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; padding: 60px 20px; text-align: center; }
        
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 20px; letter-spacing: 3px; margin-bottom: 30px; }
        .title { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: var(--text-sub); margin-bottom: 40px; line-height: 1.6; }
        
        .form-box { background: var(--bg-panel); border: 1px solid #222; padding: 40px 30px; border-radius: 8px; max-width: 500px; margin: 0 auto; text-align: left; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 13px; color: var(--gold); font-weight: 500; margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 15px; border-radius: 4px; transition: 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--gold); background: #222; }
        
        /* 주소창 전용 스타일 */
        .address-flex { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-zipcode { padding: 0 20px; background: var(--gold); color: #000; border: none; font-weight: 700; border-radius: 4px; font-size: 14px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .btn-zipcode:hover { background: #e8c552; }
        
        .summary-title { font-size: 13px; color: var(--gold); font-weight: 500; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .summary-item { font-size: 14px; color: #aaa; margin-bottom: 6px; display: block; }
        .summary-item strong { color: #fff; font-weight: 400; }
        
        .btn-submit { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; font-weight: 700; border-radius: 4px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { background: #e8c552; }
        
        .btn-back { display: block; text-align: center; color: var(--text-sub); text-decoration: none; font-size: 13px; margin-top: 20px; transition: 0.3s; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="logo">HILKER 1888</div>
    <div class="title">예약 및 상담 신청</div>
    <div class="subtitle">선택하신 비스포크 설계 데이터가 보존되어<br>전문가와의 1:1 매칭 상담으로 바로 연결됩니다.</div>

    <div class="form-box">
        <div class="input-group">
            <label for="user-name"><i class="fa-regular fa-user"></i> 고객명</label>
            <input type="text" id="user-name" placeholder="성함을 입력해 주세요.">
        </div>
        
        <div class="input-group">
            <label for="user-phone"><i class="fa-solid fa-mobile-screen-button"></i> 연락처</label>
            <input type="tel" id="user-phone" placeholder="ex) 010-1234-5678">
        </div>

        <div class="input-group">
            <label for="user-region"><i class="fa-solid fa-location-dot"></i> 배송 및 방문 주소</label>
            <div class="address-flex">
                <input type="text" id="user-region" placeholder="우측 주소 검색을 이용해 주세요." readonly>
                <button type="button" class="btn-zipcode" onclick="openPostcode()">주소 검색</button>
            </div>
            <input type="text" id="user-region-detail" placeholder="상세 주소를 입력해 주세요. (예: 101동 202호)">
        </div>

        <div style="background: #0a0a0a; padding: 20px; border-radius: 4px; border: 1px solid #1a1a1a; margin-bottom: 10px;">
            <div class="summary-title">선택하신 비스포크 스펙 요약</div>
            <div id="spec-summary"></div>
        </div>

        <button type="button" class="btn-submit" onclick="submitBespokeData()">상담 신청 완료하기</button>
        <a href="javascript:history.back();" class="btn-back">이전 단계로 이동</a>
    </div>

    <script>
        // 주소 검색 팝업 및 자동 입력 함수
        function openPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    let addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                    document.getElementById("user-region").value = addr;
                    
                    // 💡 검색 완료 후 고객이 바로 타이핑할 수 있게 상세 주소 칸으로 자동 이동
                    document.getElementById("user-region-detail").focus();
                }
            }).open();
        }

        window.onload = function() {
            const summaryDiv = document.getElementById('spec-summary');
            
            const core = localStorage.getItem('userCore') || '미선택';
            const size = localStorage.getItem('userSize') || '미선택';
            const zone = localStorage.getItem('userZone') || '미선택(자동)';
            const inner = localStorage.getItem('userInner') || '미선택';
            const fabric = localStorage.getItem('userFabric') || '미선택';
            const tension = localStorage.getItem('userTension') || '미선택';
            
            const price = localStorage.getItem('targetPrice') || '0';
            const formattedPrice = parseInt(price).toLocaleString() + '원';

            summaryDiv.innerHTML = `
                <span class="summary-item">· 타입(코어): <strong>${core}</strong></span>
                <span class="summary-item">· 규격(사이즈): <strong>${size}</strong></span>
                <span class="summary-item">· 시스템(존): <strong>${zone}</strong></span>
                <span class="summary-item">· 내부재: <strong>${inner}</strong></span>
                <span class="summary-item">· 커버원단: <strong>${fabric}</strong></span>
                <span class="summary-item">· 선호경도(텐션): <strong>${tension}</strong></span>
                <span class="summary-item">· 예상견적: <strong style="color:#D4AF37;">${formattedPrice}</strong></span>
            `;
        }

        function submitBespokeData() {
            const nameField = document.getElementById('user-name').value.trim();
            const phoneField = document.getElementById('user-phone').value.trim();
            const regionField = document.getElementById('user-region').value.trim();
            const regionDetailField = document.getElementById('user-region-detail').value.trim();

            if(!nameField || !phoneField || !regionField) {
                alert("고객명, 연락처, 기본 주소를 모두 정확히 입력해 주세요.");
                return;
            }

            // 💡 기본 주소와 상세 주소를 하나의 문장으로 예쁘게 합치기
            const fullAddress = regionField + (regionDetailField ? " " + regionDetailField : "");

            // 다음 페이지(recommend.html)의 GPS 거리 계산용으로 전체 주소 저장
            localStorage.setItem('userRegion', regionField);

            let coreText = localStorage.getItem('userCore') === 'foam' ? '폼' : '스프링';
            const coreDetail = localStorage.getItem('userCoreDetail');
            if (coreDetail) {
                coreText = `${coreText} (${coreDetail})`; 
            }

            const formData = {
                "이름": nameField, 
                "연락처": phoneField,
                "지역": fullAddress, // 💡 합쳐진 '기본주소 + 상세주소'가 시트로 넘어갑니다.
                "코어": coreText,
                "사이즈": localStorage.getItem('userSize') || '미선택',
                "존": localStorage.getItem('userZone') || '미선택',
                "내장재": localStorage.getItem('userInner') || '미선택',
                "원단": localStorage.getItem('userFabric') || '미선택',
                "텐션": localStorage.getItem('userTension') || '미선택',
                "예상견적": localStorage.getItem('targetPrice') || '0'
            };

            const sheetMonkeyUrl = "https://api.sheetmonkey.io/form/f3eHUQzLcxELGsoeFQCoCq";

            fetch(sheetMonkeyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if(response.ok) {
                    alert("맞춤 제작 상담 신청이 정상적으로 완료되었습니다.");
                    window.location.href = "recommend.html"; 
                } else {
                    alert("전송 중 오류가 발생했습니다. 다시 시도해 주세요.");
                }
            })
            .catch(error => {
                alert("서버 연결에 실패했습니다.");
                console.error(error);
            });
        }
    </script>
</body>
</html>
