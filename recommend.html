<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILKER 1888 - 맞춤 모델 추천</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --bg-base: #000000; --bg-panel: #111111; --text-main: #ffffff; --text-sub: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; text-align: center; padding: 80px 20px; }
        
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 20px; letter-spacing: 3px; margin-bottom: 40px; }
        .title { font-size: 28px; font-weight: 700; margin-bottom: 15px; }
        .subtitle { font-size: 15px; color: var(--text-sub); margin-bottom: 50px; line-height: 1.6; }
        
        .result-box { background: var(--bg-panel); border: 1px solid var(--gold); padding: 50px 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); }
        .match-rate { display: inline-block; padding: 5px 15px; border: 1px solid var(--gold); color: var(--gold); font-size: 13px; font-weight: bold; border-radius: 20px; margin-bottom: 25px; }
        .model-name { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; margin-bottom: 10px; color: #fff; letter-spacing: 1px; }
        .model-tags { font-size: 14px; color: var(--gold); margin-bottom: 25px; font-weight: 500; }
        .model-desc { font-size: 15px; color: #ccc; line-height: 1.8; margin-bottom: 40px; word-break: keep-all; }
        
        .btn { display: inline-block; padding: 16px 40px; background: var(--gold); color: #000; text-decoration: none; font-weight: 700; border-radius: 4px; font-size: 15px; transition: 0.3s; }
        .btn:hover { background: #e8c552; }
        
        .debug-info { margin-top: 30px; font-size: 12px; color: #444; border-top: 1px dashed #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="logo">HILKER 1888</div>
    <div class="title">비스포크 분석 결과</div>
    <div class="subtitle">고객님의 설계 데이터를 정밀 분석하여<br>가장 완벽하게 일치하는 모델을 찾았습니다.</div>

    <div class="result-box">
        <div class="match-rate"><i class="fa-solid fa-check"></i> 최적 매칭 모델</div>
        <div class="model-name" id="res-name">분석 중...</div>
        <div class="model-tags" id="res-tags"></div>
        <div class="model-desc" id="res-desc">데이터를 불러오는 중입니다.</div>
        <a href="index.html" class="btn">메인으로 돌아가기</a>
        
        <div class="debug-info" id="debug-text"></div>
    </div>

    <script>
        // 1. 고객 데이터 불러오기 및 정제 (한글/영문 호환)
        const rawCore = localStorage.getItem('userCore') || 'spring';
        const userCore = (rawCore.includes('폼') || rawCore.toLowerCase().includes('foam')) ? 'foam' : 'spring';

        // 존(Zone) 추출 (7존 vs 일반 5존)
        const rawZone = localStorage.getItem('userZone') || "";
        const userZone = rawZone.includes('7') ? '7zone' : 'normal';

        // 내장재 추출
        const rawInner = localStorage.getItem('userInner') || 'memory';
        const userInner = (rawInner.includes('메모리') || rawInner.toLowerCase().includes('memory')) ? 'memory' : rawInner;

        // 원단 추출 (비스코스 vs 텐셀 vs 윈터쿨)
        const rawFabric = localStorage.getItem('userFabric') || 'viscose';
        let userFabric = 'viscose';
        if (rawFabric.includes('텐셀') || rawFabric.toLowerCase().includes('tencel')) userFabric = 'tencel';
        if (rawFabric.includes('윈터') || rawFabric.toLowerCase().includes('winter')) userFabric = 'winter';

        // 텐션 추출 (글자 포함 시 숫자로 자동 변환 - 동점자 판별용 내부 로직)
        const rawTension = localStorage.getItem('userTension') || "3";
        let userTension = 3; 
        if (rawTension.includes('1') || rawTension.includes('하드')) userTension = 1;
        if (rawTension.includes('2') || rawTension.includes('미디엄하드')) userTension = 2;
        if (rawTension.includes('3') || rawTension.includes('미디엄')) userTension = 3;
        if (rawTension.includes('4') || rawTension.includes('미디엄소프트')) userTension = 4;
        if (rawTension.includes('5') || rawTension.includes('소프트')) userTension = 5;

        // 디버그 텍스트 출력
        document.getElementById('debug-text').innerText = 
            `[디버그] 인식된 데이터 -> 코어: ${userCore} | 존: ${userZone} | 원단: ${userFabric} | 내부텐션계산: ${userTension}`;

        // 2. 힐커 6종 모델 실제 데이터 세팅 (특징에서 텐션 텍스트 제외)
        const hilkerModels = [
            { 
                name: "엠파이어 (EMPIRE)", 
                core: "spring", zone: "7zone", inner: "memory", fabric: "viscose", tension: 3, 
                tags: "#4단스프링 #7존 #비스코스캐시미어", 
                desc: "최고급 비스코스 캐시미어 실크 원단에 쿨터치 폼과 7존 티타늄 하이브리드 코일(60mm 4단)이 결합되어 완벽한 밸런스를 제공합니다." 
            },
            { 
                name: "슈프림 (SUPREME)", 
                core: "spring", zone: "7zone", inner: "memory", fabric: "viscose", tension: 4, 
                tags: "#2단스프링 #7존 #은나노항균", 
                desc: "다공성 비스코스 은나노 항균 원단과 7존 티타늄 코일이 촘촘히 굴곡을 받쳐주어 구름 위에 누운 듯한 포근함을 선사합니다." 
            },
            { 
                name: "옥스포드 (OXFORD)", 
                core: "spring", zone: "normal", inner: "memory", fabric: "tencel", tension: 2, 
                tags: "#1단스프링 #5존 #친환경텐셀", 
                desc: "친환경 텐셀 원단에 두꺼운 고탄성 컴포트 폼과 티타늄 코일이 더해져 허리를 탄탄하고 안정적으로 지탱합니다." 
            },
            { 
                name: "클로제 (KLOSE)", 
                core: "spring", zone: "normal", inner: "memory", fabric: "viscose", tension: 3, 
                tags: "#1단스프링 #5존 #고밀도메모리폼", 
                desc: "3.8cm 고밀도 메모리폼과 티타늄 독립 스프링이 완벽하게 체압을 분산하여 프리미엄 지지력을 발휘합니다." 
            },
            { 
                name: "베를린 (BERLIN)", 
                core: "foam", zone: "normal", inner: "memory", fabric: "winter", tension: 1, 
                tags: "#폼코어 #윈터쿨원단 #초고밀도", 
                desc: "스프링을 완전히 대체하는 10cm 엑티브 베이스 초고밀도 지지 폼층이 적용되어 흔들림 없이 강력하게 받쳐주는 폼 매트리스입니다." 
            },
            { 
                name: "바이마르 (WEIMAR)", 
                core: "foam", zone: "normal", inner: "memory", fabric: "tencel", tension: 3, 
                tags: "#폼코어 #식물성텐셀 #HD엑티브폼", 
                desc: "식물성 텐셀 원단과 20cm HD 엑티브 폼, 그리고 두꺼운 메모리폼이 부드러움과 무너짐 없는 지지력을 동시에 제공합니다." 
            }
        ];

        // 3. 우선순위 기반 매칭 알고리즘 (가중치 점수제)
        let bestMatch = hilkerModels[0];
        let minPenalty = 9999;

        hilkerModels.forEach(model => {
            let penalty = 0;
            
            // 1순위: 코어 (불일치 시 1000점)
            if (model.core !== userCore) penalty += 1000;
            
            // 2순위: 존 (불일치 시 100점)
            if (model.zone !== userZone) penalty += 100;
            
            // 3순위: 내장재 (불일치 시 50점)
            if (model.inner !== userInner) penalty += 50;
            
            // 4순위: 원단 (불일치 시 20점)
            if (model.fabric !== userFabric) penalty += 20;
            
            // 5순위: 텐션 (동점자 분리용, 차이당 1점)
            penalty += Math.abs(model.tension - userTension);

            // 최저 페널티를 가진 모델 선정
            if (penalty < minPenalty) {
                minPenalty = penalty;
                bestMatch = model;
            }
        });

        // 4. 결과 출력
        document.getElementById('res-name').innerText = bestMatch.name;
        document.getElementById('res-tags').innerText = bestMatch.tags;
        document.getElementById('res-desc').innerText = bestMatch.desc;
    </script>
</body>
</html>
